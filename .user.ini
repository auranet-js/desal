; Auranet 2026-05-28 — OPcache config dla PHP 8.3 HTTP (LiteSpeed)
; UWAGA: zend_extension w .user.ini działa tylko jeśli rozszerzenie
; jest już załadowane globalnie. Jeśli phpinfo() nadal nie pokazuje
; opcache po wgraniu tego pliku — trzeba włączyć w cPanel
; PHP Selector → 8.3 → Extensions → opcache → ZAPISZ.

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.validate_timestamps = 1
opcache.save_comments = 1
